<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <title>Grain Headwear</title>
  <script data-vector-analytics>
(function(){
  var API='http://localhost:8001';
  var AID='8205e961-1c76-4e58-a93a-73db1c803ecc';
  if(!API||!AID)return;
  var SK='_v_sid';
  var sid=sessionStorage.getItem(SK);
  if(!sid){sid=Math.random().toString(36).slice(2)+Date.now().toString(36);sessionStorage.setItem(SK,sid)}
  function send(t){
    var d=JSON.stringify({session_id:sid,event_type:t,path:location.pathname});
    if(navigator.sendBeacon){navigator.sendBeacon(API+'/api/apps/t/'+AID+'/',new Blob([d],{type:'application/json'}))}
    else{fetch(API+'/api/apps/t/'+AID+'/',{method:'POST',body:d,headers:{'Content-Type':'application/json'},keepalive:true})}
  }
  send('pageview');
  var iv=setInterval(function(){if(!document.hidden)send('heartbeat')},60000);
  document.addEventListener('visibilitychange',function(){if(document.hidden)send('heartbeat')});
  window.addEventListener('beforeunload',function(){send('heartbeat')});
})();
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="/__vector-bridge.js"></script>
  </body>
</html>
